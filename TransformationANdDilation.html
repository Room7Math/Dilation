<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformations & Dilations</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div id="main-container">
        <canvas id="gridCanvas"></canvas>
        <div id="controls">
            <div id="controls-left">
                <button id="reflectYAxis">Reflection about Y-Axis</button>
                <button id="reflectXAxis">Reflection about X-Axis</button>
                <button id="rotateCCWButton">Rotate 90° CCW</button>
                <button id="rotateCWButton">Rotate 90° CW</button>
                <button id="rotate180Button">Rotate 180°</button>
                <div>
                    <h3>Translation</h3>
                    <label>x: <input type="number" name="xMove" value="0"></label>
                    <label>y: <input type="number" name="yMove" value="0"></label>
                    <button id="translate">Translate</button>
                </div>
                <div>
                    <h3>Dilation</h3>
                    <label>x Scale: <input type="number" name="xScaleFactor" value="1"></label>
                    <label>y Scale: <input type="number" name="yScaleFactor" value="1"></label>
                    <button id="dilate">Dilate</button>
                </div>
                <div>
                    <h3>Center of Dilation/Rotation</h3>
                    <label>x: <input type="number" name="xCoord" value="0"></label>
                    <label>y: <input type="number" name="yCoord" value="0"></label>
                    <button id="resetCenter">Reset Center to (0,0)</button>
                </div>
            </div>
            <div id="controls-right">
                <div>
                    <h3>Line of Reflection</h3>
                    <label>Equation: <input type="text" name="lineOfReflection" placeholder="y = m * x + b or x = c"></label>
                    <button id="reflection">Reflect across line</button>
                </div>
                <button id="undo">Undo</button>
                <button id="clearAll">Clear All Points</button>
                <button id="saveShape">Save Shape</button>
                <button id="loadShape">Load Shape</button>
                <button id="setCenterByClick">Set Center by Click</button>
                <button id="toggleHistory">Show Transformation History</button>
                <button id="toggleDilationView" disabled>Toggle Dilation View</button>
            </div>
        </div>
    </div>
    <div id="output">Coordinates: None</div>
    <div id="transformationLog">Transformation History: None</div>
    <footer>
        <p>Author: Jin Young Chang</p>
        <p><a href="mailto:chang_j@auhsd.us">chang_j@auhsd.us</a></p>
        <p>© 2025</p>
    </footer>
</body>
</html>
